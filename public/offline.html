<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Arbo - Sem conexão</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --text: #ffffff;
      --text-sec: #a1a1aa;
      --orange: #E8521A;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin-bottom: 24px;
      color: var(--orange);
    }
    h1 {
      margin: 0 0 16px 0;
      font-size: 24px;
      font-weight: 600;
    }
    p {
      margin: 0 0 32px 0;
      color: var(--text-sec);
      font-size: 16px;
      max-width: 80%;
    }
    button {
      background-color: var(--orange);
      color: #fff;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 1l22 22"></path>
    <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"></path>
    <path d="M5 12.55a10.94 10.94 0 015.17-2.39"></path>
    <path d="M10.71 5.05A16 16 0 0122.58 9"></path>
    <path d="M1.42 9a15.91 15.91 0 014.7-2.88"></path>
    <path d="M8.53 16.11a6 6 0 016.95 0"></path>
    <line x1="12" y1="20" x2="12.01" y2="20"></line>
  </svg>
  <h1>Sem conexão à internet</h1>
  <p>Parece que você está offline. Verifique sua conexão e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar Novamente</button>
</body>
</html>
