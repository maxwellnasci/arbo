<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#111111" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Arbo Run</title>
    <meta name="description" content="Arbo — Assessoria esportiva de corrida. Gerencie seus treinos, acompanhe sua evolução e conecte-se com seu professor." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" onload="this.onload=null;this.rel='stylesheet'" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // arbo-v4: limpeza nuclear de SWs e caches antigos (roda 1x, nunca mais)
      (function() {
        var VERSION = 'arbo-v4';
        if (localStorage.getItem('arbo_sw_ver') === VERSION) return;
        localStorage.setItem('arbo_sw_ver', VERSION);
        setTimeout(function() {
          var done = function() { window.location.reload(); };
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).then(function() {
              if ('caches' in window) {
                return caches.keys().then(function(names) {
                  return Promise.all(names.map(function(n) { return caches.delete(n); }));
                });
              }
            }).then(done).catch(done);
          } else {
            done();
          }
        }, 50);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
